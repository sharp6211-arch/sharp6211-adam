<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Tetris</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="game"></canvas>

  <div id="chatbot" class="chatbot hidden">
    <div class="chatbot-header">
      <span class="chatbot-crown">&#9830;</span> 네온 테트리스 도우미 <span class="chatbot-crown">&#9830;</span>
      <button id="chatbot-close">&times;</button>
    </div>
    <div id="chatbot-log" class="chatbot-log"></div>
    <div class="chatbot-input-row">
      <input id="chatbot-input" type="text" placeholder="질문을 입력하세요... (예: 조작법)" autocomplete="off" />
      <button id="chatbot-send">전송</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
